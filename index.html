<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Fly Air 3D mobile takeoff cinematic demo" />
    <title>Fly Air - Takeoff</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23020b2a'/%3E%3Cpath d='M8 1.2 10.4 6 14.8 6.5 11.6 9.6 12.4 14 8 11.8 3.6 14l.8-4.4L1.2 6.5 5.6 6Z' fill='%23ff9f48'/%3E%3C/svg%3E" />

    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
